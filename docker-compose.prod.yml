services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - /etc/flare:/etc/flare:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    network_mode: "host"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/flare
      REDIS_URL: redis://localhost:6379
    volumes:
      - /etc/flare:/etc/flare:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    command: npm start
    restart: unless-stopped

  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped
