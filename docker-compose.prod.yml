services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes: []
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes: []
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    command: npm start
    restart: unless-stopped

  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped
