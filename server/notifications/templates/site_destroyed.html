<!DOCTYPE html>
<html>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #6b7280;">Site destroyed</h2>
  <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
    <tr><td style="padding: 8px; color: #666;">Site</td><td style="padding: 8px; font-weight: bold;">{{ site.name }}</td></tr>
    <tr><td style="padding: 8px; color: #666;">Domain</td><td style="padding: 8px;">{{ site.domain }}</td></tr>
  </table>
  <p style="color: #6b7280;">This site's infrastructure has been fully removed. DNS records and the EC2 instance have been cleaned up.</p>
</body>
</html>
